services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ducklake
      POSTGRES_USER:     duck
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "duck", "-d", "ducklake"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"  # MinIO Console (admin UI)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 10

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      # PostgreSQL
      POSTGRES_HOST:     postgres
      POSTGRES_DB:       ducklake
      POSTGRES_USER:     duck
      POSTGRES_PASSWORD: postgres
      # S3 / MinIO
      S3_ENDPOINT:       minio:9000
      S3_KEY_ID:         minioadmin
      S3_SECRET:         minioadmin
      S3_BUCKET:         ducklake
      # API-nyckel — byt ut i produktion!
      API_KEY:           change-me
      # Garage (prod) — sätt GARAGE_ADMIN_URL + GARAGE_ADMIN_TOKEN för att byta från MinIO
      # GARAGE_ADMIN_URL:   http://garage:3903
      # GARAGE_ADMIN_TOKEN: <admin-token>
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
